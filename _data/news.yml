- title: "Research Manitoba Invests Nearly $9 Million for CFI Innovation Fund Projects"
  date: "2026-03-13"
  url: "https://researchmanitoba.ca/research-manitoba-invests-nearly-9-million-for-cfi-innovation-fund-projects/"
  description: >
    Research Manitoba has announced nearly $9 million in provincial matching funds for
    four research projects at the University of Manitoba supported through the Canada
    Foundation for Innovation Innovation Fund. Among the funded projects is the EIC Canada
    Collaboration's work enabling high-intensity collisions and high-granularity detectors
    for the Electron-Ion Collider, receiving $2,066,759 to support Canada's participation
    in the EIC project.

- title: "UM Physicists Shaping the World's Next Supercollider and the Future of Medical Technology"
  date: "2026-03-13"
  url: "https://umtoday.ca/stories/um-physicists-shaping-worlds-next-supercollider-and-future-medical-technology"
  description: >
    University of Manitoba researchers are leading Canada's contribution to the
    Electron-Ion Collider at Brookhaven National Laboratory, backed by a $7 million
    investment from the Canada Foundation for Innovation and Research Manitoba.
    Their work also drives advances in medical technology, including more portable
    cancer-treatment equipment for underserved communities.

- title: "EIC Canada Receives CFI Innovation Fund Award"
  date: "2026-03-13"
  url: "https://www.innovation.ca/news/innovation-fund-march-2026"
  description: >
    The Canada Foundation for Innovation (CFI) has awarded EIC Canada Collaboration
    funding through the Innovation Fund to support detector development and
    computational infrastructure for Canadian participation in the Electron Ion Collider.
    All funded projects from the March 2026 Innovation Fund competition can be found
    at the CFI news release.

- title: "EIC Canada CFI Grant – Press Release"
  date: "2026-03-13"
  url: "https://www.innovation.ca/news/innovation-fund-march-2026"
  description: >
    A joint press release from participating Canadian universities highlights the
    significance of the CFI Investment for the EIC Canada effort, enabling world-class
    research at the new Electron Ion Collider at Brookhaven National Laboratory.
    The full list of funded projects is available in the CFI Innovation Fund March 2026
    news release.

- title: "EIC Canada Students Present at International Workshop"
  date: "2024-06-05"
  url: "https://www.bnl.gov/eic/"
  description: >
    Graduate and postdoctoral researchers from EIC Canada institutions presented their
    detector simulation and physics analysis work at the EIC Users Group annual workshop,
    showcasing the contributions enabled by Canadian funding agencies.

- title: "New EIC Canada Member Institutions Join Collaboration"
  date: "2024-03-20"
  url: "https://eic-canada.org/members"
  description: >
    Several new Canadian universities have formally joined the EIC Canada Collaboration,
    broadening the network of researchers and students engaged in EIC detector development
    and physics programs.
